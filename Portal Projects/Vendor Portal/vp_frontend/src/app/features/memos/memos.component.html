<div class="page-header flex-between fade-in-up">
  <div>
    <div class="page-title">Debit / Credit Memos</div>
    <div class="page-subtitle">Adjustments and memo documents for your account</div>
  </div>
  <div class="flex gap-2">
    <input class="kt-input" style="width:240px" placeholder="🔍  Search doc, text..." [(ngModel)]="search" (input)="onSearch()" />
    <span class="kt-badge kt-badge-gray" style="padding:8px 14px;font-size:12px">{{ filtered.length }} records</span>
  </div>
</div>

<div *ngIf="loading" class="skeleton" style="height:360px; border-radius:16px"></div>
<div *ngIf="error" class="error-msg">⚠ {{ error }}</div>

<div class="kt-card fade-in-up delay-1" *ngIf="!loading && !error">
  <div *ngIf="filtered.length === 0" class="empty-state">
    <div class="empty-state-icon">📝</div>
    <div class="empty-state-title">No memo documents found</div>
  </div>
  <div class="kt-table-wrap" *ngIf="filtered.length > 0">
    <table class="kt-table">
      <thead>
        <tr>
          <th>Document No.</th>
          <th>Posting Date</th>
          <th>Amount</th>
          <th>Currency</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of filtered">
          <td class="font-mono"><strong>{{ r.Belnr }}</strong></td>
          <td>{{ formatDate(r.HBudat) }}</td>
          <td class="font-mono"><strong>{{ r.Dmbtr }}</strong></td>
          <td><span class="kt-badge kt-badge-info">{{ r.HWaers }}</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
